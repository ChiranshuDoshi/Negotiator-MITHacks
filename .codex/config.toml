[mcp_servers.tavily]
url = "https://mcp.tavily.com/mcp/"
auth = "oauth"
enabled = true
default_tools_approval_mode = "auto"

[mcp_servers.elevenlabs]
command = "node"
args = ["scripts/run-elevenlabs-mcp.mjs"]
cwd = "."
enabled = true
startup_timeout_sec = 30
tool_timeout_sec = 120
default_tools_approval_mode = "writes"
